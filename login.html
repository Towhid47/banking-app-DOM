<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS Cdn link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[512px] mx-auto h-screen bg-blue-50">

    <!-- Login Section  -->
     <div class=" h-full flex flex-col justify-center items-center">
            <!-- Login Banner -->
             <div class="w-3/5 h-[140px] bg-[url('assets/bg.png')] bg-cover">
                 <img src="assets/Group.png" alt="logo" class="w-20 h-20 mx-auto mt-4">

             </div>

             <!-- Login Form  -->
              <div class="border-none w-4/5 bg-slate-50 p-8 rounded-2xl">
                    <form class="">
                        <label class="text-2xl">Mobile Number</label>
                        <input type="text" class="border-2 border-gray-400 w-full h-10 rounded-md mt-2 mb-4 px-2" placeholder="Enter your number">

                        <label class="text-2xl">PIN</label>
                        <input type="password" class="border-2 border-gray-400 w-full h-10 rounded-md mt-2 mb-4 px-2" placeholder="Enter 4 digit pin">

                        <button class="w-full h-10 bg-blue-500 text-white rounded-md mt-4"  type="submit">Login</button>
                    </form>
              </div>

     </div>

   

    
</body>
</html>
