<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Pay</title>
    <link rel="stylesheet" href="style.css">

     <!-- Tailwind CSS Cdn link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[512px] mx-auto h-screen bg-blue-50">
     
        <!-- Banner Logo  -->
    <div class="w-full p-1 bg-black flex justify-center items-center gap-1 mb-4">
        <img src="assets/digipay.png" class="w-20"> <h1 class="text-white text-2xl font-bold">Digi <span class="text-blue-300">Pay</span></h1>
    </div>

    <!-- Main Section  -->
     <main class="h-screen">

        <!-- Total Balance & Login/Logout Toggle section -->
        <div class="p-6 flex justify-between items-center">
            <!-- Total Balance -->
            <div class="flex items-center">
                <img src="assets/Group.png" alt="" class="block">
                <div>
                    <p class="text-3xl font-bold text-green-500">₹ 0.00</p>
                    <h1 class="text-2xl font-bold">Total Balance</h1>
                </div>
            </div>
            <!-- Login/Logout Toggle -->
             <div class="">
                <button class="bg-gray-300 hover:bg-gray-400 text-black  py-2 px-4 rounded"><img src="assets/logout.png" alt="Logout" class="inline">Log Out</button>
             </div>
        </div>
        <hr>

        <!-- Features Section -->
        <div class="p-8  grid grid-cols-3 gap-2">

            <div class="border-2 border-blue-600 p-4 flex flex-col items-center justify-center rounded-xl">
                <img src="assets/wallet1.png" alt="" class="">
                <p>Add Money</p>
            </div>
            <div class="border-2 border-blue-600 p-4 flex flex-col items-center justify-center rounded-xl">
                <img src="assets/send1.png" alt="" class="">
                <p>Cash Out</p>
            </div>

            <div class="border-2 border-blue-600 p-3 flex flex-col items-center justify-center rounded-xl">
                <img src="assets/money1.png"  alt="" class="">
                <p>Transfer Money</p>
            </div>
            
            <div class="border-2 border-blue-600 p-4 flex flex-col items-center justify-center rounded-xl">
                <img src="assets/purse1.png" alt="" class="">
                <p>Pay Bill</p>
            </div>
            <div class="border-2 border-blue-600 p-4 flex flex-col items-center justify-center rounded-xl">
                <img src="assets/bonus1.png" alt="" class="">
                <p>Get Bonus</p>
            </div>   
            
            <div class="border-2 border-blue-600 p-4 flex flex-col items-center justify-center rounded-xl">
                <img src="assets/transaction1.png" alt="" class="">
                <p>Transactions</p>
            </div>
        </div>

        <!-- Feature Details -->
        <div class="p-8 bg-blue-100 rounded-2xl">

            <!-- Add Money Form -->
             <div class="bg-white p-2 rounded-xl">
                <h1 class="text-2xl font-bold border-b-2 border-gray-200 pb-3 text-center">Add Money</h1>

                <form class="flex flex-col gap-3 p-3">
                    <label class=" font-semibold">Select a Bank</label>
                    <select class="border-2 border-gray-300 p-2 rounded-full bg-gray-200">
                        <option value="">Select Bank</option>
                        <option value="City Bank">City Bank</option>
                        <option value="Agrani Bank">Agrani Bank</option>
                        <option value="Brac Bank">Brac Bank</option>
                        <option value="IFIC Bank">IFIC Bank</option>
                        <option value="Dutch Bangla Bank">Dutch Bangla Bank</option>
                    </select>

                    <label class="font-semibold">Bank Account Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Bank Account Number">

                    <label class="font-semibold">Amount to Add</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Amount">

                    <label class="font-semibold">PIN Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter PIN Number">

                    <button class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-full mt-4">Add Money</button>
                </form>
             </div>

             <!--Cash Out Form-->
             <div class="bg-white p-2 rounded-xl">
                 <h1 class="text-2xl font-bold border-b-2 border-gray-200 pb-3 text-center">Cash Out</h1>

                 <form class="flex flex-col gap-3 p-3">
                    <label class="font-semibold ">Agent Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Bank Account Number">

                    <label class="font-semibold">Amount</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Amount">

                    <label class="font-semibold">PIN Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter PIN Number">

                    <button class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-full mt-4">Withdraw Money</button>
                </form>
             </div>

              <!--Transfer Money Form-->
             <div class="bg-white p-2 rounded-xl">
                 <h1 class="text-2xl font-bold border-b-2 border-gray-200 pb-3 text-center">Transfer Money</h1>

                 <form class="flex flex-col gap-3 p-3">
                    <label class="font-semibold ">User Account Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter User Account Number">

                    <label class="font-semibold">Amount</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Amount">

                    <label class=" font-semibold">PIN Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter PIN Number">

                    <button class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-full mt-4">Transfer Money</button>
                </form>
             </div>

               <!--Get Bonus Form-->
             <div class="bg-white p-2 rounded-xl">
                 <h1 class="text-2xl font-bold border-b-2 border-gray-200 pb-3 text-center">Get Bonus</h1>

                 <form class="flex flex-col gap-3 p-3">
                    <label class=" font-semibold">Enter Bonus Coupon</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Coupon Code">

                    <button class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-full mt-4">Get Bonus</button>
                </form>
             </div>

              <!--Pay Bill Form-->
             <div class="bg-white p-2 rounded-xl">
                 <h1 class="text-2xl font-bold border-b-2 border-gray-200 pb-3 text-center">Pay Bill</h1>
                 
                 <form class="flex flex-col gap-3 p-3">
                    <label class=" font-semibold">Select to Pay</label>
                    <select class="border-2 border-gray-300 p-2 rounded-full bg-gray-200">
                        <option value="Water" default >Water</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Gas">Gas</option>
                        <option value="Internet">Internet</option>
                    </select>

                    <label class="font-semibold">Bill Account Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Bill Account Number">

                    <label class="font-semibold">Amount to Pay</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter Amount">

                    <label class="font-semibold">PIN Number</label>
                    <input type="text" class="border-2 border-gray-300 p-2 rounded-full bg-gray-200" placeholder="Enter PIN Number">

                    <button class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-full mt-4">Pay Now</button>
                </form>
                 
             </div>

             <!-- Transaction History -->
              <div class="bg-white p-2 rounded-xl">
                 <h1 class="text-2xl font-bold border-b-2 border-gray-200 pb-3 text-center">Transaction History</h1>
                 
                 <div class="p-3">

                    <p class="font-semibold text-lg mb-2">No transactions yet.</p>

                    <!-- Transaction List Container -->
                    <div>
                        <!-- Example Transaction Item -->
                        <div class="border-2 border-gray-300 p-3 rounded-lg mb-2">
                            <p class="font-semibold">Transaction ID: 123456</p>
                            <p>Type: Add Money</p>
                            <p>Amount: ₹500.00</p>
                            <p>Date: 2024-06-01</p>
                        </div>
                        <!-- More transaction items can be added here -->  
                    </div>
                 </div>

              </div>
        </div>         
        
    </main>
</body>
</html>
